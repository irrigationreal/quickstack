name: Canary - Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # dummy database url for build time --> prisma
  DATABASE_URL: file:./dev.db

permissions:
  contents: read

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Enable Corepack/Yarn
        run: |
          corepack enable
          corepack prepare yarn@stable --activate
          yarn --version

      - name: Install dependencies for backend
        run: yarn install && yarn run prisma-generate

      - name: Run tests for backend
        run: yarn test

  build-and-push-amd64:
    runs-on: ubuntu-24.04
    needs: test
    if: ${{ needs.test.result == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image (amd64)
        uses: docker/build-push-action@v7
        with:
          context: ./
          push: true
          platforms: linux/amd64
          build-args: |
            VERSION_ARG=canary-${{ github.run_number }}
          tags: |
            quickstack/quickstack:canary-amd64

  build-and-push-arm64:
    runs-on: ubuntu-24.04-arm
    needs: test
    if: ${{ needs.test.result == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image (arm64)
        uses: docker/build-push-action@v7
        with:
          context: ./
          push: true
          platforms: linux/arm64
          build-args: |
            VERSION_ARG=canary-${{ github.run_number }}
          tags: |
            quickstack/quickstack:canary-arm64

  build-and-push-manifest:
    runs-on: ubuntu-latest
    needs: [build-and-push-amd64, build-and-push-arm64]
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create multi-arch manifest (canary)
        run: |
          docker buildx imagetools create -t quickstack/quickstack:canary \
            quickstack/quickstack:canary-amd64 \
            quickstack/quickstack:canary-arm64
          docker buildx imagetools inspect quickstack/quickstack:canary

  build-and-push-mongodb-backup:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ needs.test.result == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push MongoDB Backup (amd64)
        uses: docker/build-push-action@v7
        with:
          context: ./additional-containers/mongodb-backup
          file: ./additional-containers/mongodb-backup/Dockerfile.amd64
          push: true
          platforms: linux/amd64
          build-args: |
            VERSION_ARG=canary-${{ github.run_number }}
          tags: |
            quickstack/job-backup-mongodb:canary

  build-and-push-postgres-backup:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ needs.test.result == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push PostgreSQL Backup (amd64)
        uses: docker/build-push-action@v7
        with:
          context: ./additional-containers/postgres-backup
          file: ./additional-containers/postgres-backup/Dockerfile.amd64
          push: true
          platforms: linux/amd64
          build-args: |
            VERSION_ARG=canary-${{ github.run_number }}
          tags: |
            quickstack/job-backup-postgres:canary

  build-and-push-mariadb-backup:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ needs.test.result == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push MariaDB Backup (amd64)
        uses: docker/build-push-action@v7
        with:
          context: ./additional-containers/mariadb-backup
          file: ./additional-containers/mariadb-backup/Dockerfile.amd64
          push: true
          platforms: linux/amd64
          build-args: |
            VERSION_ARG=canary-${{ github.run_number }}
          tags: |
            quickstack/job-backup-mariadb:canary
